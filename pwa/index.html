<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F766E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Presupuesto">
  <title>Presupuesto</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="./splash/launch-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="./splash/launch-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="./splash/launch-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="./splash/launch-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <style>
    html,body{margin:0;min-height:100%;background:#F6F8FA;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif}
    .boot-splash{position:fixed;inset:0;display:grid;place-items:center;background:#F6F8FA}
    .boot-mark{width:92px;height:92px;border-radius:22px;box-shadow:0 18px 46px rgba(17,24,39,.18)}
    .boot-loader{position:absolute;left:50%;bottom:calc(70px + env(safe-area-inset-bottom));width:44px;height:3px;overflow:hidden;border-radius:999px;background:#DDE3EA;transform:translateX(-50%)}
    .boot-loader span{display:block;width:38%;height:100%;border-radius:999px;background:#0F766E;animation:boot-slide 1s ease-in-out infinite}
    @keyframes boot-slide{0%{transform:translateX(-105%)}50%{transform:translateX(85%)}100%{transform:translateX(270%)}}
  </style>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app" id="app" aria-live="polite">
    <div class="boot-splash" role="status" aria-label="Cargando presupuesto">
      <img class="boot-mark" src="./icons/icon-180.png" alt="">
      <div class="boot-loader" aria-hidden="true"><span></span></div>
    </div>
  </main>
  <div class="modal" id="modal" aria-hidden="true"></div>
  <div class="toast" id="toast" role="status"></div>
  <script src="./vendor/supabase.min.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
