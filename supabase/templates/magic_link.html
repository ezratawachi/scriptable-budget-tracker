<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codigo de Budget Tracker</title>
</head>
<body style="margin:0;background:#f6f8fa;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <div style="max-width:520px;margin:0 auto;padding:28px 18px;">
    <div style="background:#ffffff;border:1px solid #dde3ea;border-radius:12px;padding:24px;">
      <div style="font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#0f766e;">Budget Tracker</div>
      <h1 style="margin:8px 0 10px;font-size:24px;line-height:1.2;color:#111827;">Tu codigo de acceso</h1>
      <p style="margin:0 0 18px;color:#667085;font-size:15px;line-height:1.5;">
        Escribe este codigo en la PWA instalada para conectar tu nube de Supabase.
      </p>
      <div style="margin:0 0 18px;padding:16px;border-radius:10px;background:#e6f6f2;color:#0f766e;text-align:center;font-size:34px;font-weight:900;letter-spacing:.24em;">
        {{ .Token }}
      </div>
      <p style="margin:0;color:#667085;font-size:13px;line-height:1.5;">
        Si no pediste este codigo, puedes ignorar este email.
      </p>
    </div>
  </div>
</body>
</html>
