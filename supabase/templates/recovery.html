<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset your Budget Tracker password</title>
</head>
<body style="margin:0;background:#f6f8fa;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <div style="max-width:560px;margin:0 auto;padding:32px 18px;">
    <div style="background:#ffffff;border:1px solid #dde3ea;border-radius:16px;overflow:hidden;box-shadow:0 14px 34px rgba(16,24,40,.08);">
      <div style="padding:24px 24px 18px;background:linear-gradient(135deg,#0f766e 0%,#13a08f 100%);color:#ffffff;">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.16);font-size:18px;font-weight:900;">BT</div>
        <div style="margin-top:14px;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.86;">Budget Tracker</div>
        <h1 style="margin:6px 0 0;font-size:26px;line-height:1.2;color:#ffffff;">Reset your password</h1>
      </div>

      <div style="padding:24px;">
        <p style="margin:0 0 18px;color:#667085;font-size:15px;line-height:1.55;">
          We received a request to reset the password for <strong style="color:#111827;">{{ .Email }}</strong>.
        </p>

        <a href="{{ .ConfirmationURL }}" style="display:block;width:100%;box-sizing:border-box;margin:0 0 18px;padding:15px 18px;border-radius:12px;background:#0f766e;color:#ffffff;text-align:center;text-decoration:none;font-size:16px;font-weight:800;">
          Reset password
        </a>

        <p style="margin:0 0 14px;color:#667085;font-size:13px;line-height:1.55;">
          This link expires soon and can only be used once.
        </p>

        <p style="margin:0;color:#667085;font-size:13px;line-height:1.55;">
          If you did not request this, you can safely ignore this email. Your password will stay the same.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
